name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # main 由 deploy.yml 负责（它已含 analyze + test 门禁）

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
